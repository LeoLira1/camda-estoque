name: Build APK Android

on:
  push:
    branches:
      - main
      - 'claude/**'
  workflow_dispatch:   # permite rodar manualmente pelo botão no GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true

      - name: Criar arquivo .env com credenciais do secrets.toml
        working-directory: camda-app
        run: |
          URL=$(grep 'TURSO_DATABASE_URL' ../.streamlit/secrets.toml | sed 's/.*= *"\(.*\)"/\1/')
          TOKEN=$(grep 'TURSO_AUTH_TOKEN' ../.streamlit/secrets.toml | sed 's/.*= *"\(.*\)"/\1/')
          cat > .env << EOF
          TURSO_DATABASE_URL=${URL}
          TURSO_AUTH_TOKEN=${TOKEN}
          CAMDA_PASSWORD=forca
          EOF

      - name: Instalar dependências Flutter
        working-directory: camda-app
        run: flutter pub get

      - name: Build APK release
        working-directory: camda-app
        run: flutter build apk --release

      - name: Copiar APK
        run: |
          cp camda-app/build/app/outputs/flutter-apk/app-release.apk \
             camda-app/camda-estoque-latest.apk

      - name: Upload APK como artifact
        uses: actions/upload-artifact@v4
        with:
          name: camda-estoque-apk
          path: camda-app/camda-estoque-latest.apk
          retention-days: 30

      - name: Commit APK no repositório
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add camda-app/camda-estoque-latest.apk
          git diff --staged --quiet || git commit -m "chore: APK atualizado automaticamente [skip ci]"
          git push
