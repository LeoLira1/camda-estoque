name: Build APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
          cache: true

      - name: Create .env file
        working-directory: camda-app
        run: |
          echo 'TURSO_DATABASE_URL = "${{ secrets.TURSO_DATABASE_URL }}"' >> .env
          echo 'TURSO_AUTH_TOKEN = "${{ secrets.TURSO_AUTH_TOKEN }}"' >> .env
          echo 'CAMDA_PASSWORD="${{ secrets.CAMDA_PASSWORD }}"' >> .env

      - name: Install dependencies
        working-directory: camda-app
        run: flutter pub get

      - name: Build APK (release)
        working-directory: camda-app
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: camda-app-release-${{ github.run_number }}
          path: camda-app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
