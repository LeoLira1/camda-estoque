name: Build APK

on:
  push:
    branches:
      - main
      - master
      - 'claude/**'
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
          cache: true

      - name: Create .env file
        working-directory: camda-app
        run: |
          echo 'TURSO_DATABASE_URL=${{ secrets.TURSO_DATABASE_URL }}' >> .env
          echo 'TURSO_AUTH_TOKEN=${{ secrets.TURSO_AUTH_TOKEN }}' >> .env
          echo 'CAMDA_PASSWORD=${{ secrets.CAMDA_PASSWORD }}' >> .env

      - name: Install dependencies
        working-directory: camda-app
        run: flutter pub get

      - name: Build APK (release)
        working-directory: camda-app
        run: flutter build apk --release

      - name: Rename APK
        run: |
          cp camda-app/build/app/outputs/flutter-apk/app-release.apk camda-app-v${{ github.run_number }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "Camda App v${{ github.run_number }}"
          files: camda-app-v${{ github.run_number }}.apk
          body: "Build automático #${{ github.run_number }}"
